name: Feature request
description: Suggest an improvement or new workflow.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant host mode, platform, protocol behavior, or logs with secrets removed.
    validations:
      required: false
