name: Bug report
description: Report broken or unexpected behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, host mode, and runtime details where relevant.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Codex CLI version, Node version, Python version, and host mode.
    validations:
      required: false
  - type: checkboxes
    id: security
    attributes:
      label: Security check
      options:
        - label: I have not included `~/.codex/auth.json`, `~/.codex/state_5.sqlite`, tokens, enrollment records, or private logs.
          required: true
